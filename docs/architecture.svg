<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Color palette: light backgrounds for each component type -->
  </defs>

  <!-- White background -->
  <rect width="680" height="540" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Spring Boot 4.0.6 — Local Kubernetes Architecture</text>

  <!-- ── Namespace boundary ── -->
  <rect x="172" y="50" width="490" height="430" rx="16" fill="#F8F8F6" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="196" y="72" font-size="12" fill="#5F5E5A" font-weight="500">namespace: helloworld</text>

  <!-- ── curl / Browser ── -->
  <!-- Box -->
  <rect x="30" y="224" width="124" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="92" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">curl / Browser</text>
  <text x="92" y="264" text-anchor="middle" font-size="11" fill="#5F5E5A">http://localhost</text>

  <!-- Arrow curl → Ingress -->
  <line x1="156" y1="252" x2="202" y2="252" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="179" y="244" text-anchor="middle" font-size="10" fill="#5F5E5A">:80</text>

  <!-- ── NGINX Ingress ── -->
  <rect x="204" y="196" width="152" height="112" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="280" y="224" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">NGINX Ingress</text>
  <text x="280" y="242" text-anchor="middle" font-size="11" fill="#0F6E56">ingress-nginx</text>
  <text x="280" y="258" text-anchor="middle" font-size="11" fill="#0F6E56">/api/v1/* routing</text>
  <text x="280" y="274" text-anchor="middle" font-size="11" fill="#0F6E56">/actuator/* routing</text>
  <text x="280" y="290" text-anchor="middle" font-size="11" fill="#0F6E56">ingressClass: nginx</text>

  <!-- Arrow Ingress → Service -->
  <line x1="358" y1="252" x2="400" y2="252" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── K8s Service ── -->
  <rect x="402" y="216" width="148" height="72" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="476" y="242" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">K8s Service</text>
  <text x="476" y="260" text-anchor="middle" font-size="11" fill="#185FA5">ClusterIP</text>
  <text x="476" y="276" text-anchor="middle" font-size="11" fill="#185FA5">port 80 → 8080</text>

  <!-- Arrow Service → Pod 1 (up) -->
  <path d="M476 216 L476 170 L552 170 L552 148" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow Service → Pod 2 (down) -->
  <path d="M550 252 L590 252 L590 356 L598 356" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Pod 1 ── -->
  <rect x="490" y="66" width="162" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="571" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Pod 1</text>
  <text x="571" y="110" text-anchor="middle" font-size="11" fill="#534AB7">Spring Boot 4.0.6</text>
  <text x="571" y="128" text-anchor="middle" font-size="11" fill="#534AB7">Java 21 · :8080</text>
  <!-- Health check label -->
  <text x="571" y="156" text-anchor="middle" font-size="10" fill="#888780">/actuator/health ✓</text>

  <!-- ── Pod 2 ── -->
  <rect x="600" y="316" width="62" height="80" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="631" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Pod 2</text>
  <text x="631" y="360" text-anchor="middle" font-size="11" fill="#534AB7">SB 4.0.6</text>
  <text x="631" y="376" text-anchor="middle" font-size="11" fill="#534AB7">:8080</text>
  <text x="631" y="406" text-anchor="middle" font-size="10" fill="#888780">/actuator/health ✓</text>

  <!-- ── HPA ── -->
  <rect x="398" y="456" width="160" height="48" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="478" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">HPA</text>
  <text x="478" y="494" text-anchor="middle" font-size="11" fill="#BA7517">2–5 replicas · CPU / mem</text>
  <!-- HPA dashed arrow up to Service -->
  <line x1="478" y1="456" x2="478" y2="290" stroke="#BA7517" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- ── Endpoints legend (bottom) ── -->
  <rect x="30" y="420" width="128" height="136" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="94" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#2C2C2A">API Endpoints</text>
  <text x="42" y="458" font-size="10" fill="#444441">GET  /api/v1/hello</text>
  <text x="42" y="474" font-size="10" fill="#444441">GET  /api/v1/hello/{name}</text>
  <text x="42" y="490" font-size="10" fill="#444441">POST /api/v1/hello</text>
  <text x="42" y="506" font-size="10" fill="#444441">GET  /api/v1/info</text>
  <text x="42" y="522" font-size="10" fill="#5F5E5A">GET  /actuator/health</text>

  <!-- ── Dockerfile / Maven label ── -->
  <rect x="30" y="330" width="128" height="68" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="94" y="351" text-anchor="middle" font-size="11" font-weight="600" fill="#501313">Build</text>
  <text x="42" y="368" font-size="10" fill="#791F1F">Maven → JAR</text>
  <text x="42" y="384" font-size="10" fill="#791F1F">Docker multi-stage</text>
  <text x="42" y="400" font-size="10" fill="#791F1F">imagePullPolicy: Never</text>
</svg>
