apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helloworld-ingress
  namespace: helloworld
  labels:
    app: helloworld
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Rewrite only for API paths — UI paths are passed through as-is
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          # ── Spring Boot API paths (most-specific first) ──────────────────
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: helloworld-service
                port:
                  number: 80

          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: helloworld-service
                port:
                  number: 80

          # ── Angular UI — catch-all (must be last) ────────────────────────
          # Handles /, /index.html, and all Angular SPA routes.
          # NGINX inside the UI pod serves index.html for unknown paths.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: angular-ui-service
                port:
                  number: 80
