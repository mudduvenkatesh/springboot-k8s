apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-ui-deployment
  namespace: helloworld
  labels:
    app: angular-ui
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: angular-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: angular-ui
        version: "1.0.0"
    spec:
      containers:
        - name: angular-ui
          image: angular-ui:1.0.0
          imagePullPolicy: Never          # Use local image
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
